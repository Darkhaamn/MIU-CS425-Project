<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>CarShareX - Car Rental</title>
</head>
<body>
<section>
    <div class="text-center mb-5">
        <h1 class="display-5">Welcome to CarShareX</h1>
        <p class="lead text-muted">Search, book, and manage car rentals with ease.</p>
        <a th:href="@{/customer/cars}" class="btn btn-primary btn-lg me-2">Browse Cars</a>
        <a th:href="@{/customer/register}" class="btn btn-outline-primary btn-lg">Register as Customer</a>
    </div>

    <h3 class="mb-3">Available Cars</h3>
    <div class="row g-3" th:if="${!cars.isEmpty()}">
        <div class="col-md-4" th:each="car : ${cars}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${car.brand + ' ' + car.model}">Car</h5>
                    <p class="card-text">
                        <span class="badge bg-secondary" th:text="${car.carType}">SUV</span>
                        <span class="text-success fw-bold ms-2" th:text="'$' + ${car.pricePerDay} + '/day'">$50/day</span>
                    </p>
                    <a th:href="@{/customer/cars/{id}(id=${car.carId})}" class="btn btn-sm btn-primary">View Details</a>
                </div>
            </div>
        </div>
    </div>
    <p th:if="${cars.isEmpty()}" class="text-muted">No cars available yet. Suppliers can add cars after registering.</p>
</section>
</body>
</html>
