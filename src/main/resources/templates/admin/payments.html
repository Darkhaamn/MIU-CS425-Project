<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Payments</title></head>
<body>
<section>
    <h2>Monitor Payments</h2>
    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Amount</th><th>Method</th><th>Status</th><th>Transaction</th></tr></thead>
        <tbody>
        <tr th:each="p : ${payments}">
            <td th:text="${p.paymentId}"></td>
            <td th:text="'$' + ${p.amount}"></td>
            <td th:text="${p.paymentMethod}"></td>
            <td th:text="${p.paymentStatus}"></td>
            <td th:text="${p.transactionId}"></td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
