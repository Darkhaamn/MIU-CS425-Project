<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>System Reports</title></head>
<body>
<section>
    <h2>System Reports</h2>
    <table class="table">
        <thead><tr><th>ID</th><th>Supplier</th><th>Type</th><th>Date</th><th>Revenue</th><th>Bookings</th></tr></thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${r.reportId}"></td>
            <td th:text="${r.supplier != null} ? ${r.supplier.companyName} : '-'"></td>
            <td th:text="${r.reportType}"></td>
            <td th:text="${r.generatedDate}"></td>
            <td th:text="'$' + ${r.totalRevenue}"></td>
            <td th:text="${r.totalBookings}"></td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
