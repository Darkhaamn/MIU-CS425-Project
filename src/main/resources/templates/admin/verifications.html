<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Verifications</title></head>
<body>
<section>
    <h2>Verifications</h2>
    <table class="table">
        <thead><tr><th>ID</th><th>Supplier</th><th>Type</th><th>Status</th><th></th></tr></thead>
        <tbody>
        <tr th:each="v : ${verifications}">
            <td th:text="${v.verificationId}"></td>
            <td th:text="${v.supplier != null} ? ${v.supplier.companyName} : '-'"></td>
            <td th:text="${v.verificationType}"></td>
            <td th:text="${v.verificationStatus}"></td>
            <td>
                <form th:if="${v.verificationStatus == 'PENDING'}" th:action="@{/admin/verifications/{id}/approve(id=${v.verificationId})}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-success" type="submit">Approve</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
