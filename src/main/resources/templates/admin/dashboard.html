<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Admin Dashboard</title></head>
<body>
<section>
    <div class="d-flex justify-content-between mb-4">
        <h2>Admin Dashboard</h2>
        <a th:href="@{/admin/logout}" class="btn btn-outline-secondary btn-sm">Logout</a>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="card p-3 text-center"><h3 th:text="${customerCount}">0</h3><p>Customers</p></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><h3 th:text="${supplierCount}">0</h3><p>Suppliers</p></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><h3 th:text="${bookingCount}">0</h3><p>Bookings</p></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><h3 th:text="${paymentCount}">0</h3><p>Payments</p></div></div>
    </div>
    <div class="d-flex flex-wrap gap-2">
        <a th:href="@{/admin/customers}" class="btn btn-outline-dark">Manage Customers</a>
        <a th:href="@{/admin/suppliers}" class="btn btn-outline-dark">Manage Suppliers</a>
        <a th:href="@{/admin/verifications}" class="btn btn-outline-dark">Verifications</a>
        <a th:href="@{/admin/payments}" class="btn btn-outline-dark">Payments</a>
        <a th:href="@{/admin/reports}" class="btn btn-outline-dark">Reports</a>
        <a th:href="@{/admin/admins}" class="btn btn-outline-dark">Admins</a>
    </div>
</section>
</body>
</html>
