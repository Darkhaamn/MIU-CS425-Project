<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Manage Customers</title></head>
<body>
<section>
    <div class="d-flex justify-content-between mb-3">
        <h2>Customers</h2>
        <a th:href="@{/admin/customers/new}" class="btn btn-success">Add Customer</a>
    </div>
    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th></th></tr></thead>
        <tbody>
        <tr th:each="c : ${customers}">
            <td th:text="${c.userId}"></td>
            <td th:text="${c.fullName}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.phoneNumber}"></td>
            <td>
                <a th:href="@{/admin/customers/{id}/edit(id=${c.userId})}" class="btn btn-sm btn-primary">Edit</a>
                <form th:action="@{/admin/customers/{id}/delete(id=${c.userId})}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/admin/dashboard}" class="btn btn-link">Back</a>
</section>
</body>
</html>
