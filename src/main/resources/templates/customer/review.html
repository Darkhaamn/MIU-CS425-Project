<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Write Review</title></head>
<body>
<section class="col-md-6">
    <h2 th:text="'Review ' + ${car.brand + ' ' + car.model}"></h2>
    <form th:action="@{/customer/reviews}" method="post">
        <input type="hidden" name="carId" th:value="${carId}"/>
        <div class="mb-3">
            <label class="form-label">Rating (1-5)</label>
            <input type="number" name="rating" min="1" max="5" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Comment</label>
            <textarea name="comment" class="form-control" rows="3" required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Submit Review</button>
    </form>
</section>
</body>
</html>
