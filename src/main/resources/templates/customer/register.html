<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Customer Register</title></head>
<body>
<section class="col-md-6 mx-auto">
    <h2>Customer Registration</h2>
    <form th:action="@{/customer/register}" th:object="${customer}" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input class="form-control" th:field="*{fullName}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input class="form-control" th:field="*{phoneNumber}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Address</label>
            <input class="form-control" th:field="*{address}"/>
        </div>
        <button class="btn btn-primary" type="submit">Register</button>
        <a th:href="@{/customer/login}" class="btn btn-link">Already have an account?</a>
    </form>
</section>
</body>
</html>
