<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Car Details</title></head>
<body>
<section>
    <h2 th:text="${car.brand + ' ' + car.model}"></h2>
    <p><strong>Type:</strong> <span th:text="${car.carType}"></span></p>
    <p><strong>Price:</strong> $<span th:text="${car.pricePerDay}"></span> / day</p>
    <p><strong>Available:</strong> <span th:text="${car.availabilityStatus}"></span></p>
    <a th:if="${car.availabilityStatus}" th:href="@{/customer/book/{id}(id=${car.carId})}" class="btn btn-success">Book This Car</a>
    <a th:href="@{/customer/reviews/new(carId=${car.carId})}" class="btn btn-outline-secondary">Write Review</a>

    <h4 class="mt-4">Reviews</h4>
    <div th:each="r : ${reviews}" class="border rounded p-2 mb-2">
        <strong th:text="${r.rating} + '/5'"></strong> — <span th:text="${r.comment}"></span>
    </div>
    <p th:if="${reviews.isEmpty()}" class="text-muted">No reviews yet.</p>
</section>
</body>
</html>
