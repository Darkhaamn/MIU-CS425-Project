<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Supplier Reports</title></head>
<body>
<section>
    <div class="d-flex justify-content-between mb-3">
        <h2>Reports</h2>
        <form th:action="@{/supplier/reports/generate}" method="post">
            <button class="btn btn-primary" type="submit">Generate Summary Report</button>
        </form>
    </div>
    <table class="table">
        <thead><tr><th>ID</th><th>Type</th><th>Date</th><th>Revenue</th><th>Bookings</th></tr></thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${r.reportId}"></td>
            <td th:text="${r.reportType}"></td>
            <td th:text="${r.generatedDate}"></td>
            <td th:text="'$' + ${r.totalRevenue}"></td>
            <td th:text="${r.totalBookings}"></td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
