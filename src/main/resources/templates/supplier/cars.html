<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Manage Cars</title></head>
<body>
<section>
    <div class="d-flex justify-content-between mb-3">
        <h2>Manage Cars</h2>
        <a th:href="@{/supplier/cars/new}" class="btn btn-success">Add Car</a>
    </div>
    <table class="table">
        <thead><tr><th>Brand</th><th>Model</th><th>Type</th><th>Price/Day</th><th>Available</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="car : ${cars}">
            <td th:text="${car.brand}"></td>
            <td th:text="${car.model}"></td>
            <td th:text="${car.carType}"></td>
            <td th:text="'$' + ${car.pricePerDay}"></td>
            <td th:text="${car.availabilityStatus}"></td>
            <td>
                <a th:href="@{/supplier/cars/{id}/edit(id=${car.carId})}" class="btn btn-sm btn-primary">Edit</a>
                <form th:action="@{/supplier/cars/{id}/availability(id=${car.carId})}" method="post" class="d-inline">
                    <input type="hidden" name="available" th:value="${!car.availabilityStatus}"/>
                    <button class="btn btn-sm btn-secondary" type="submit">Toggle Availability</button>
                </form>
                <form th:action="@{/supplier/cars/{id}/delete(id=${car.carId})}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
