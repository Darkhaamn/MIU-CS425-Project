<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const src = `erDiagram
  ADMIN ||--o{ REPORT : generates
  CUSTOMER ||--o{ BOOKING : makes
  CUSTOMER ||--o{ PAYMENT : pays
  CUSTOMER ||--o{ REVIEW : writes
  SUPPLIER ||--o{ CAR : owns
  SUPPLIER ||--|| VERIFICATION : has
  BOOKING ||--|| CAR : includes
  BOOKING ||--|| PAYMENT : has
  CAR ||--o{ REVIEW : receives
  VERIFICATION ||--o{ VERIFICATION_DOCUMENT : contains

  ADMIN {
    long adminId PK
    string fullName
    string email
    string password
    string role
  }

  CUSTOMER {
    long userId PK
    string fullName
    string email
    string phoneNumber
    string password
    string address
  }

  SUPPLIER {
    long supplierId PK
    string supplierType
    string companyName
    string email
    string password
    double rating
    string verificationStatus
    boolean hiddenAddress
  }

  CAR {
    long carId PK
    long supplierId FK
    string brand
    string model
    double pricePerDay
    boolean availabilityStatus
    string carType
  }

  BOOKING {
    long bookingId PK
    long userId FK
    long carId FK
    date pickupDate
    date returnDate
    double totalPrice
    string bookingStatus
  }

  PAYMENT {
    long paymentId PK
    long bookingId FK
    long userId FK
    double amount
    string paymentMethod
    string paymentStatus
    string transactionId
  }

  REVIEW {
    long reviewId PK
    long carId FK
    long userId FK
    int rating
    string comment
    date reviewDate
  }

  REPORT {
    long reportId PK
    long adminId FK
    string reportType
    date generatedDate
    double totalRevenue
    int totalBookings
  }

  VERIFICATION {
    long verificationId PK
    long supplierId FK
    string verificationType
    string verificationStatus
    date verifiedAt
    string faceRecognitionResult
  }

  VERIFICATION_DOCUMENT {
    long documentId PK
    long verificationId FK
    string documentType
    string documentURL
    date uploadDate
    date expiryDate
  }`;
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
