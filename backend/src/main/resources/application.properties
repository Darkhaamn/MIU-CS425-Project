spring.application.name=CarShareX

# MySQL — set via environment variables (GitHub Secrets in CI, .env locally)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://168.138.52.172:3306/carsharex?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=8080

# CORS — comma-separated origin patterns
app.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:3000,https://miu-car-rental-project.vercel.app,https://*.vercel.app

# Cross-origin session cookies (set SESSION_COOKIE_* env vars in production)
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# Console test menu (set to false to disable)
app.console.enabled=false