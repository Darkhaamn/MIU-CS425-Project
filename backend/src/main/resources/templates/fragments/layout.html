<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:replace="${title}">CarShareX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">CarShareX</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/customer/cars}">Browse Cars</a>
            <a class="nav-link text-white" th:href="@{/customer/login}">Customer</a>
            <a class="nav-link text-white" th:href="@{/supplier/login}">Supplier</a>
            <a class="nav-link text-white" th:href="@{/admin/login}">Admin</a>
        </div>
    </div>
</nav>
<main class="container pb-5">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:replace="${content}">Content</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
