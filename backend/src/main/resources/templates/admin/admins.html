<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Admins</title></head>
<body>
<section>
    <div class="d-flex justify-content-between mb-3">
        <h2>Administrators</h2>
        <a th:href="@{/admin/admins/new}" class="btn btn-success">Add Admin</a>
    </div>
    <table class="table">
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead>
        <tbody>
        <tr th:each="a : ${admins}">
            <td th:text="${a.adminId}"></td>
            <td th:text="${a.fullName}"></td>
            <td th:text="${a.email}"></td>
            <td th:text="${a.role}"></td>
            <td>
                <form th:action="@{/admin/admins/{id}/delete(id=${a.adminId})}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
