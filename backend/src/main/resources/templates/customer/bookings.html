<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>My Bookings</title></head>
<body>
<section>
    <h2>My Bookings</h2>
    <table class="table table-hover">
        <thead><tr><th>ID</th><th>Cars</th><th>Dates</th><th>Total</th><th>Status</th><th></th></tr></thead>
        <tbody>
        <tr th:each="b : ${bookings}">
            <td th:text="${b.bookingId}"></td>
            <td>
                <span th:each="c, stat : ${b.cars}" th:text="${c.brand + ' ' + c.model + (stat.last ? '' : ', ')}"></span>
            </td>
            <td th:text="${b.pickupDate} + ' → ' + ${b.returnDate}"></td>
            <td th:text="'$' + ${b.totalPrice}"></td>
            <td th:text="${b.bookingStatus}"></td>
            <td>
                <form th:if="${b.bookingStatus == 'CONFIRMED'}" th:action="@{/customer/bookings/{id}/cancel(id=${b.bookingId})}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-danger" type="submit">Cancel</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
