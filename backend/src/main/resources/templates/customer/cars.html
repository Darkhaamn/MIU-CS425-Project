<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Search Cars</title></head>
<body>
<section>
    <h2>Search / Filter Cars</h2>
    <form th:action="@{/customer/cars}" method="get" class="row g-2 mb-4">
        <div class="col-md-5"><input name="keyword" class="form-control" placeholder="Brand or model" th:value="${keyword}"/></div>
        <div class="col-md-4"><input name="carType" class="form-control" placeholder="Car type (SUV, Sedan...)" th:value="${carType}"/></div>
        <div class="col-md-3"><button class="btn btn-primary w-100" type="submit">Search</button></div>
    </form>
    <div class="row g-3">
        <div class="col-md-4" th:each="car : ${cars}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 th:text="${car.brand + ' ' + car.model}"></h5>
                    <p th:text="${car.carType} + ' · $' + ${car.pricePerDay} + '/day'"></p>
                    <span class="badge" th:classappend="${car.availabilityStatus} ? 'bg-success' : 'bg-secondary'"
                          th:text="${car.availabilityStatus} ? 'Available' : 'Unavailable'"></span>
                    <div class="mt-2">
                        <a th:href="@{/customer/cars/{id}(id=${car.carId})}" class="btn btn-sm btn-primary">Details</a>
                        <a th:if="${car.availabilityStatus}" th:href="@{/customer/book/{id}(id=${car.carId})}" class="btn btn-sm btn-success">Book</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
