<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Edit Profile</title></head>
<body>
<section class="col-md-6">
    <h2>Edit Profile</h2>
    <form th:action="@{/customer/profile}" th:object="${customer}" method="post">
        <div class="mb-3"><label class="form-label">Full Name</label><input class="form-control" th:field="*{fullName}"/></div>
        <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" th:field="*{phoneNumber}"/></div>
        <div class="mb-3"><label class="form-label">Address</label><input class="form-control" th:field="*{address}"/></div>
        <div class="mb-3"><label class="form-label">New Password (optional)</label><input type="password" class="form-control" th:field="*{password}"/></div>
        <button class="btn btn-primary" type="submit">Save</button>
        <a th:href="@{/customer/dashboard}" class="btn btn-link">Back</a>
    </form>
</section>
</body>
</html>
