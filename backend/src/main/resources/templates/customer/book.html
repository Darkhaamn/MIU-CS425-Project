<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Book Car</title></head>
<body>
<section class="col-md-6">
    <h2 th:text="'Book ' + ${car.brand + ' ' + car.model}"></h2>
    <p class="text-muted">Identity verification and payment will be processed automatically.</p>
    <form th:action="@{/customer/book/{id}(id=${car.carId})}" method="post">
        <div class="mb-3"><label class="form-label">Pickup Date</label><input type="date" name="pickupDate" class="form-control" required/></div>
        <div class="mb-3"><label class="form-label">Return Date</label><input type="date" name="returnDate" class="form-control" required/></div>
        <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select name="paymentMethod" class="form-select">
                <option value="CREDIT_CARD">Credit Card</option>
                <option value="DEBIT_CARD">Debit Card</option>
                <option value="PAYPAL">PayPal</option>
            </select>
        </div>
        <button class="btn btn-success" type="submit">Confirm Booking</button>
    </form>
</section>
</body>
</html>
