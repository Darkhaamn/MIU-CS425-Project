<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Customer Dashboard</title></head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="'Hello, ' + ${customer.fullName}">Dashboard</h2>
        <a th:href="@{/customer/logout}" class="btn btn-outline-secondary btn-sm">Logout</a>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-4"><a th:href="@{/customer/cars}" class="btn btn-outline-primary w-100">Search Cars</a></div>
        <div class="col-md-4"><a th:href="@{/customer/bookings}" class="btn btn-outline-primary w-100">My Bookings</a></div>
        <div class="col-md-4"><a th:href="@{/customer/profile}" class="btn btn-outline-primary w-100">Edit Profile</a></div>
    </div>
    <h4>Recent Bookings</h4>
    <table class="table table-striped" th:if="${!bookings.isEmpty()}">
        <thead><tr><th>ID</th><th>Dates</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>
        <tr th:each="b : ${bookings}">
            <td th:text="${b.bookingId}"></td>
            <td th:text="${b.pickupDate} + ' → ' + ${b.returnDate}"></td>
            <td th:text="'$' + ${b.totalPrice}"></td>
            <td><span class="badge bg-info" th:text="${b.bookingStatus}"></span></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${bookings.isEmpty()}" class="text-muted">No bookings yet.</p>
</section>
</body>
</html>
