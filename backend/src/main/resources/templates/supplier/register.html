<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Supplier Register</title></head>
<body>
<section class="col-md-6 mx-auto">
    <h2>Supplier Registration</h2>
    <form th:action="@{/supplier/register}" th:object="${supplier}" method="post">
        <div class="mb-3"><label class="form-label">Company Name</label><input class="form-control" th:field="*{companyName}" required/></div>
        <div class="mb-3"><label class="form-label">Supplier Type</label><input class="form-control" th:field="*{supplierType}" placeholder="Individual / Company"/></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" th:field="*{email}" required/></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" th:field="*{password}" required/></div>
        <button class="btn btn-primary" type="submit">Register</button>
        <a th:href="@{/supplier/login}" class="btn btn-link">Login</a>
    </form>
</section>
</body>
</html>
