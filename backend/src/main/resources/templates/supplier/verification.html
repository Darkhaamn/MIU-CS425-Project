<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Verification</title></head>
<body>
<section>
    <h2>Supplier Verification</h2>
    <div th:if="${verification}">
        <p><strong>Status:</strong> <span th:text="${verification.verificationStatus}"></span></p>
        <p><strong>Type:</strong> <span th:text="${verification.verificationType}"></span></p>
        <h4>Documents</h4>
        <ul th:if="${documents != null}">
            <li th:each="d : ${documents}" th:text="${d.documentType} + ' - ' + ${d.documentURL}"></li>
        </ul>
        <p th:if="${documents == null or documents.isEmpty()}" class="text-muted">No documents uploaded.</p>
    </div>
    <p th:unless="${verification}" class="text-muted">Verification record will be created on registration.</p>
</section>
</body>
</html>
