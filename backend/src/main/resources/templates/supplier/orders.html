<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Rental Orders</title></head>
<body>
<section>
    <h2>Manage Rental Orders</h2>
    <table class="table table-striped">
        <thead><tr><th>Booking ID</th><th>Customer</th><th>Dates</th><th>Total</th><th>Status</th></tr></thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.bookingId}"></td>
            <td th:text="${o.customer.fullName}"></td>
            <td th:text="${o.pickupDate} + ' → ' + ${o.returnDate}"></td>
            <td th:text="'$' + ${o.totalPrice}"></td>
            <td th:text="${o.bookingStatus}"></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${orders.isEmpty()}" class="text-muted">No orders yet.</p>
</section>
</body>
</html>
