<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Supplier Login</title></head>
<body>
<section class="col-md-5 mx-auto">
    <h2>Supplier Login</h2>
    <form th:action="@{/supplier/login}" method="post">
        <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required/></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required/></div>
        <button class="btn btn-primary" type="submit">Login</button>
        <a th:href="@{/supplier/register}" class="btn btn-link">Register</a>
    </form>
</section>
</body>
</html>
