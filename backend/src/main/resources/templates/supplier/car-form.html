<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Car Form</title></head>
<body>
<section class="col-md-6">
    <h2 th:text="${car.carId != null} ? 'Edit Car' : 'Add Car'">Car Form</h2>
    <form th:action="${car.carId != null} ? @{/supplier/cars/{id}(id=${car.carId})} : @{/supplier/cars}" th:object="${car}" method="post">
        <div class="mb-3"><label class="form-label">Brand</label><input class="form-control" th:field="*{brand}" required/></div>
        <div class="mb-3"><label class="form-label">Model</label><input class="form-control" th:field="*{model}" required/></div>
        <div class="mb-3"><label class="form-label">Car Type</label><input class="form-control" th:field="*{carType}"/></div>
        <div class="mb-3"><label class="form-label">Price Per Day</label><input type="number" step="0.01" class="form-control" th:field="*{pricePerDay}" required/></div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" th:field="*{availabilityStatus}"/>
            <label class="form-check-label">Available</label>
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
    </form>
</section>
</body>
</html>
